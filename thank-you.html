<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>香气已被收藏</title>

<style>
:root {
  --bg: #f6f4ef;
  --ink: #2b2b2b;
  --accent: #b89b5e;
}

body{
  margin:0;
  font-family:"Noto Serif SC","Source Han Serif SC","Songti SC",serif;
  background:var(--bg);
  color:var(--ink);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  overflow:hidden;
  animation: fadeIn 1.8s ease forwards;
}

.container{
  max-width:620px;
  padding:50px 30px;
  opacity:0;
  animation: floatIn 2.5s ease forwards;
  animation-delay:0.6s;
}

h2{
  font-size:1.6rem;
  font-weight:normal;
  letter-spacing:0.12em;
  color:var(--accent);
  margin-bottom:1.5rem;
}

p{
  line-height:1.9;
  color:#555;
  font-size:1rem;
}

a{
  display:inline-block;
  margin-top:3rem;
  padding:10px 28px;
  border-radius:999px;
  border:1px solid var(--accent);
  color:var(--accent);
  text-decoration:none;
  transition:all 0.4s ease;
}

a:hover{
  background:var(--accent);
  color:white;
}

/* 动画 */
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

@keyframes floatIn {
  from {
    opacity:0;
    transform: translateY(20px);
  }
  to {
    opacity:1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>你的香气已被收纳</h2>
  <p>
    在气味之中，时间被保存。<br>
    你的记忆此刻进入这份集体档案，<br>
    成为某个未来时刻再次被唤起的微光。
  </p>

  <a href="index.html">返回香气名录</a>
</div>

</body>
</html>
